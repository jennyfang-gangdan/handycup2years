<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>无碍理想 - 20260503final</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --beer-gold: #f4a460;
            --success: #2ecc71;
            --error: #e74c3c;
            --ink: #3d2b1f;
            --bg: #fdf5e6;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'ZCOOL XiaoWei', serif; overflow: hidden; }

        #map-viewport { 
            width: 100vw; 
            height: 100vh; 
            overflow-y: auto; 
            overflow-x: hidden; 
            position: relative; 
            scroll-behavior: smooth; 
            background: var(--bg); 
            -webkit-overflow-scrolling: touch; 
        }

        .map-content { 
            width: 100%; 
            height: 2600px; 
            background: url('asset/map.png') no-repeat top center; 
            background-size: 100% auto; 
            position: relative;
            padding-bottom: 450px; 
            box-sizing: border-box;
            will-change: transform; 
        }

        #player-char {
            position: absolute; width: 140px; height: 140px;
            background: url('asset/charactor.png') no-repeat center center;
            background-size: contain; z-index: 500;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.3));
            transform: translate(-75%, -95%); 
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        .hotspot {
            position: absolute; width: 46px; height: 46px; background: #fff;
            border: 3px solid var(--ink); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; z-index: 100;
        }
        .hotspot.active { animation: pulse 1.5s infinite; border-color: var(--beer-gold); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244,164,96,0.6); } 100% { box-shadow: 0 0 0 12px rgba(244,164,96,0); } }
        .hotspot.finished { background: var(--beer-gold); color: white; border-color: white; opacity: 0.6; }
        .hotspot.locked { opacity: 0.15; }

        #landing-page {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--beer-gold);
            padding: 20px; text-align: center;
        }
        .start-btn { margin-top: 30px; padding: 12px 40px; border: 2px solid var(--beer-gold); color: var(--beer-gold); background: transparent; border-radius: 50px; font-family: inherit; font-size: 1.1rem; }

        #enter-btn-wrap { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 2000; display: none; }
        .action-btn { background: var(--beer-gold); color: white; border: none; padding: 16px 45px; border-radius: 50px; font-size: 1.2rem; font-family: inherit; box-shadow: 0 8px 20px rgba(0,0,0,0.3); animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #video-scene { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; align-items: center; justify-content: center; }
        #ending-video { width: 100%; height: 100%; object-fit: cover; }
        
        .mobile-toast {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; background: white; border-radius: 20px; padding: 25px;
            text-align: center; z-index: 3500; display: none; box-shadow: 0 15px 50px rgba(0,0,0,0.4);
        }

        #quiz-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .quiz-card { width: 85%; background: white; padding: 30px 20px; border-radius: 24px; max-height: 80vh; overflow-y: auto; }
        .opt-btn { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #eee; border-radius: 14px; font-size: 0.95rem; font-family: inherit; text-align: left; background: #fdfdfd; }

        #reward-card { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .medal-box { width: 100%; max-width: 320px; background: #fff; border-radius: 30px; padding: 40px 20px; text-align: center; border: 5px solid var(--beer-gold); }
        .medal-img { width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--beer-gold); margin-bottom: 20px; object-fit: cover; }
        .timestamp { font-family: monospace; color: #888; font-size: 0.75rem; margin-top: 20px; border-top: 1px dashed #ddd; padding-top: 15px; }
    </style>
</head>
<body>

    <div id="landing-page">
        <img src="asset/logo.jpg" style="width: 160px; border-radius: 20px; margin-bottom: 20px;">
        <h2 style="letter-spacing: 4px; margin-bottom: 10px;">无碍理想酒馆</h2>
        <p style="opacity: 0.7; font-size: 0.9rem; line-height: 1.6;">每一个理想都值得被平等对待<br>开启一段寻找无障碍之光的旅程</p>
        <button class="start-btn" onclick="closeLanding()">开始探索</button>
    </div>

    <div id="map-viewport">
        <div class="map-content" id="map-inner">
            <div id="player-char"></div>
            <div id="spot-0" class="hotspot active" style="top: 17%; left: 45%;">☝️</div>
            <div id="spot-1" class="hotspot locked" style="top: 36%; left: 19%;">✌️</div>
            <div id="spot-2" class="hotspot locked" style="top: 30%; left: 70%;">🤟</div>
            <div id="spot-3" class="hotspot locked" style="top: 41%; left: 88%;">🖖</div>
            <div id="spot-4" class="hotspot locked" style="top: 50%; left: 80%;">🖐️</div>
            <div id="spot-5" class="hotspot locked" style="top: 54%; left: 52%;">🤙</div>
            <div id="spot-6" class="hotspot locked" style="top: 66%; left: 28%;">☝️</div>
            <div id="spot-7" class="hotspot locked" style="top: 80%; left: 21%;">🖕</div>
            <div id="spot-8" class="hotspot locked" style="top: 75%; left: 58%;">👊</div>
            <div id="spot-9" class="hotspot locked" style="top: 88%; left: 63%;">🍻</div>
            <div id="bottom-anchor" style="position:absolute; bottom:0; height:1px; width:100%;"></div>
        </div>
    </div>

    <div id="enter-btn-wrap">
        <button class="action-btn" onclick="playEndingVideo()">进入酒馆 🍻</button>
    </div>

    <div id="video-scene">
        <video id="ending-video" playsinline webkit-playsinline>
            <source src="asset/video.mp4" type="video/mp4">
        </video>
    </div>

    <div id="custom-toast" class="mobile-toast">
        <h3 id="toast-title" style="margin:0 0 10px 0;"></h3>
        <p id="toast-msg" style="color:#666; font-size:0.9rem; margin:0;"></p>
    </div>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <h3 id="q-title" style="color:var(--beer-gold); margin-top:0;"></h3>
            <p id="q-text" style="line-height:1.5; color:#333;"></p>
            <div id="opt-box"></div>
        </div>
    </div>

    <div id="reward-card">
        <div class="medal-box">
            <img src="asset/store.jpg" class="medal-img">
            <h2 style="color:var(--beer-gold); margin: 0 0 10px 0;">闯关成功 · 理想奖章</h2>
            <p style="color:#444; line-height: 1.6; margin: 0;">凭此奖章可免费兑换<br><b style="color:var(--beer-gold); font-size: 1.2rem;">【无碍理想精酿】</b>一杯</p>
            <div id="time-stamp" class="timestamp"></div>
            <p style="font-size: 0.65rem; color: #ccc; margin-top: 8px;">* 请向店员出示此页面 | 截图无效</p>
            <button onclick="location.reload()" style="margin-top:20px; background:none; border:1px solid #ddd; padding:8px 20px; border-radius:20px; color:#999; font-size:0.8rem;">重新探索</button>
        </div>
    </div>

<script>
    const spots = [{t:17, l:45}, {t:36, l:19}, {t:30, l:70}, {t:41, l:88}, {t:50, l:80}, {t:54, l:52}, {t:66, l:28}, {t:80, l:21}, {t:75, l:58}, {t:88, l:63}];
    const quizData = [
        { q: "盲道上的圆点凸起，它的真实身份是？", a: ["前方到站提示", "停步或转弯警告", "按摩脚底用的"], c: 1, ok: "正确！这是视觉障碍者的“红灯”。" },
        { q: "轮椅坡道不仅要斜，比例也很重要。理想比例是？", a: ["1:12 (稳如泰山)", "1:5 (速度与激情)", "只要有斜度就行"], c: 0, ok: "专家！这样的坡度最安全。" },
        { q: "面对听障朋友，最友好的交流方式是？", a: ["使劲大喊大叫", "面对面平视清晰交谈", "默默走开"], c: 1, ok: "没错，平等的注视是最好的沟通。" },
        { q: "导盲犬正在工作中，你的正确做法是？", a: ["喂它零食", "摸摸头合影", "不抚摸不喂食不呼唤"], c: 2, ok: "满分！它是工作的专业人士。" },
        { q: "看到轮椅朋友上不去台阶，你会？", a: ["强行抬上去", "询问是否需要帮助", "视而不见"], c: 1, ok: "尊重他人的独立性，先询问再动手。" },
        { q: "无障碍电梯的控制板通常安装在？", a: ["天花板上", "低位横向安装", "门背后隐藏"], c: 1, ok: "细节控！低位设计是为了触手可及。" },
        { q: "酒馆设置低位吧台是为了？", a: ["方便轮椅朋友平视交互", "给外卖员放箱子", "节省木料"], c: 0, ok: "平等交谈，从高度对齐开始。" },
        { q: "为视障朋友介绍餐具，最清晰的方式是？", a: ["让他自己摸", "帮他决定吃什么", "按时钟点位介绍位置"], c: 2, ok: "专业！3点钟方向有惊喜。" },
        { q: "什么是真正的无障碍？", a: ["只服务残障人士", "每个人都会受益的设计", "为了应付检查"], c: 1, ok: "真谛！无障碍让每个人生活更轻松。" },
        { q: "终于抵达无碍理想酒馆，你要做？", a: ["干一杯庆祝", "拍照支持无碍建设", "以上都要！"], c: 2, ok: "大圆满！理想之门为你敞开。" }
    ];

    let currentLvl = 0;

    function closeLanding() {
        document.getElementById('landing-page').style.display = 'none';
        updateCharacter();
    }

    function showToast(title, msg) {
        const t = document.getElementById('custom-toast');
        document.getElementById('toast-title').innerText = title;
        document.getElementById('toast-msg').innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function updateCharacter() {
        const char = document.getElementById('player-char');
        const target = spots[currentLvl];
        char.style.top = target.t + '%';
        char.style.left = target.l + '%';
        
        if(currentLvl === 9) {
            setTimeout(() => {
                document.getElementById('bottom-anchor').scrollIntoView({ behavior: 'smooth', block: 'end' });
                document.getElementById('enter-btn-wrap').style.display = 'block';
            }, 800);
        } else {
            const scrollPos = (target.t / 100) * 2600 - window.innerHeight / 2;
            document.getElementById('map-viewport').scrollTo({ top: scrollPos, behavior: 'smooth' });
        }
    }

    function handleSpotClick(idx) {
        if(idx !== currentLvl) return;
        const data = quizData[idx];
        document.getElementById('q-title').innerText = `第 ${idx+1} 站`;
        document.getElementById('q-text').innerText = data.q;
        const box = document.getElementById('opt-box');
        box.innerHTML = '';
        data.a.forEach((txt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = `${String.fromCharCode(65+i)}. ${txt}`;
            btn.onclick = () => {
                if(i === data.c) {
                    document.getElementById('quiz-overlay').style.display = 'none';
                    showToast('✅ 挑战成功', data.ok);
                    document.getElementById(`spot-${currentLvl}`).classList.replace('active', 'finished');
                    currentLvl++;
                    if(currentLvl < 10) {
                        const next = document.getElementById(`spot-${currentLvl}`);
                        next.classList.remove('locked');
                        next.classList.add('active');
                        setTimeout(updateCharacter, 600);
                    } else {
                        updateCharacter();
                    }
                } else {
                    showToast('❌ 再试一次', '留意身边的细节，理想生活更近一步。');
                }
            };
            box.appendChild(btn);
        });
        document.getElementById('quiz-overlay').style.display = 'flex';
    }

    function playEndingVideo() {
        document.getElementById('enter-btn-wrap').style.display = 'none';
        const scene = document.getElementById('video-scene');
        const video = document.getElementById('ending-video');
        scene.style.display = 'flex';
        video.play();
        video.onended = () => showMedal();
    }

    function showMedal() {
        const rewardCard = document.getElementById('reward-card');
        const stamp = document.getElementById('time-stamp');
        const now = new Date();
        const timeStr = `ID: ${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')} | ${now.toLocaleTimeString()}`;
        stamp.innerText = timeStr;
        rewardCard.style.display = 'flex';
        document.getElementById('video-scene').style.display = 'none';
    }

    document.querySelectorAll('.hotspot').forEach((el, i) => el.onclick = () => handleSpotClick(i));
</script>
</body>
</html>
